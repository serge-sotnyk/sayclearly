name: Frontend bundle and API types freshness

on:
  pull_request:
    paths:
      - 'src/sayclearly/**'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'src/sayclearly/**'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'

jobs:
  bundle-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync

      - run: npm ci

      - run: npm run build:frontend

      - name: Verify generated API types are up to date
        run: |
          if ! git diff --exit-code -- src/sayclearly/static/api_types.ts; then
            echo "::error::Generated TypeScript API types are stale. Run 'npm run generate:types' locally and commit src/sayclearly/static/api_types.ts."
            exit 1
          fi

      - name: Verify bundle is up to date
        run: |
          if ! git diff --exit-code -- src/sayclearly/static/dist/; then
            echo "::error::Frontend bundle is stale. Run 'npm run build:frontend' locally and commit the result in src/sayclearly/static/dist/."
            exit 1
          fi
